<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>독서 캘린더</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Gowun Dodum', sans-serif;
    background: transparent;
    margin: 0;
    padding: 20px 16px;
  }
  .wrap { width: 100%; max-width: 100%; }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .month-label { font-family: 'Jua', sans-serif; font-size: 18px; color: #2C2C2A; }
  .nav-btns { display: flex; gap: 4px; }
  .nav-btns button {
    width: 28px; height: 28px; padding: 0;
    border: 0.5px solid #D3D1C7; background: white;
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: #5F5E5A;
  }
  .nav-btns button:hover { background: #F1EFE8; }
  .weekday-row {
    display: grid; grid-template-columns: repeat(7, 1fr);
    margin-bottom: 6px;
  }
  .weekday-row div {
    padding: 4px 0; text-align: center;
    font-family: 'Jua', sans-serif; font-size: 11px;
  }
  .day-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px;
  }
  .day-cell {
    aspect-ratio: 1 / 1; max-height: 52px;
    border: 0.5px solid #E3E1D8; border-radius: 8px;
    background: white;
    display: flex; flex-direction: column;
    align-items: flex-start; justify-content: flex-start;
    padding: 5px; gap: 3px; cursor: pointer;
  }
  .day-cell:hover { border-color: #B4B2A9; }
  .day-cell.empty { visibility: hidden; cursor: default; }
  .day-num { font-size: 12px; }
  .dot-row { display: flex; gap: 2px; min-height: 6px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .editor {
    display: none; margin-top: 1.25rem;
    background: white; border: 0.5px solid #E3E1D8;
    border-radius: 12px; padding: 1rem 1.25rem;
  }
  .editor-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .editor-header p { font-family: 'Jua', sans-serif; font-size: 15px; margin: 0; }
  .editor-header button {
    width: 28px; height: 28px; padding: 0; border: none; background: none;
    cursor: pointer; font-size: 16px; color: #888780;
    display: flex; align-items: center; justify-content: center; border-radius: 50%;
  }
  .editor-header button:hover { background: #F1EFE8; }
  .input-row { display: flex; gap: 8px; }
  .input-row input {
    flex: 1; font-family: 'Gowun Dodum', sans-serif;
    border: 0.5px solid #D3D1C7; border-radius: 8px;
    padding: 8px 12px; font-size: 14px; height: 36px;
  }
  .input-row input:focus { outline: 2px solid #CDE9F6; border-color: #A8D8EA; }
  .input-row button {
    white-space: nowrap; font-family: 'Gowun Dodum', sans-serif;
    border: 0.5px solid #D3D1C7; background: white; border-radius: 8px;
    padding: 0 16px; font-size: 14px; cursor: pointer;
  }
  .input-row button:hover { background: #F1EFE8; }
  .book-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .book-row {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 13px; padding: 8px 10px;
    background: #F7F6F2; border-radius: 8px;
  }
  .book-row .left { display: flex; align-items: center; gap: 8px; }
  .book-row .left .dot { width: 8px; height: 8px; flex-shrink: 0; }
  .book-row button {
    width: 24px; height: 24px; padding: 0; border: none; background: none;
    cursor: pointer; color: #B4B2A9; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .book-row button:hover { color: #993C1D; }
  .empty-msg { font-size: 13px; color: #B4B2A9; margin: 4px 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="month-label" id="month-label">2026년 10월</div>
    <div class="nav-btns">
      <button id="prev-btn" aria-label="이전 달">&#8249;</button>
      <button id="next-btn" aria-label="다음 달">&#8250;</button>
    </div>
  </div>

  <div class="weekday-row" id="weekday-row"></div>
  <div class="day-grid" id="day-grid"></div>

  <div class="editor" id="editor">
    <div class="editor-header">
      <p id="editor-date"></p>
      <button id="close-editor" aria-label="닫기">&times;</button>
    </div>
    <div class="input-row">
      <input id="book-input" type="text" placeholder="읽은 책 제목" />
      <button id="add-book-btn">추가</button>
    </div>
    <div class="book-list" id="book-list"></div>
  </div>
</div>

<script>
const weekdays = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const weekdayColor = (i) => i === 0 ? '#E24B4A' : (i === 6 ? '#378ADD' : '#2C2C2A');
const palette = ['#FBD9E2', '#CDE9F6', '#E4DAF1'];
const STORAGE_KEY = 'reading-calendar-data';

let current = new Date();
let data = {};
let selectedKey = null;

function loadAll(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    data = raw ? JSON.parse(raw) : {};
  } catch(e) { data = {}; }
}

function saveAll(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  catch(e) { console.error('save failed', e); }
}

function keyOf(y,m,d){ return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }

function renderWeekdayRow(){
  const row = document.getElementById('weekday-row');
  row.innerHTML = '';
  weekdays.forEach((w,i) => {
    const cell = document.createElement('div');
    cell.textContent = w;
    cell.style.color = weekdayColor(i);
    row.appendChild(cell);
  });
}

function renderGrid(){
  document.getElementById('month-label').textContent = current.getFullYear() + '년 ' + (current.getMonth()+1) + '월';
  const grid = document.getElementById('day-grid');
  grid.innerHTML = '';
  const y = current.getFullYear(), m = current.getMonth();
  const firstDow = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const totalCells = Math.ceil((firstDow + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i++){
    const dayNum = i - firstDow + 1;
    const cell = document.createElement('div');
    cell.className = 'day-cell';

    if (dayNum < 1 || dayNum > daysInMonth){
      cell.classList.add('empty');
    } else {
      const dow = (firstDow + dayNum - 1) % 7;
      const num = document.createElement('span');
      num.className = 'day-num';
      num.textContent = dayNum;
      num.style.color = weekdayColor(dow);
      cell.appendChild(num);

      const k = keyOf(y, m, dayNum);
      const books = data[k] || [];
      const dotRow = document.createElement('div');
      dotRow.className = 'dot-row';
      books.slice(0, 4).forEach((title, idx) => {
        const dot = document.createElement('span');
        dot.className = 'dot';
        dot.style.background = palette[idx % palette.length];
        dotRow.appendChild(dot);
      });
      cell.appendChild(dotRow);

      cell.addEventListener('click', () => openEditor(k, y, m, dayNum));
    }
    grid.appendChild(cell);
  }
}

function openEditor(k, y, m, d){
  selectedKey = k;
  document.getElementById('editor').style.display = 'block';
  document.getElementById('editor-date').textContent = y + '년 ' + (m+1) + '월 ' + d + '일';
  document.getElementById('book-input').value = '';
  renderBookList();
}

function renderBookList(){
  const list = document.getElementById('book-list');
  list.innerHTML = '';
  const books = data[selectedKey] || [];
  if (books.length === 0){
    const empty = document.createElement('p');
    empty.className = 'empty-msg';
    empty.textContent = '아직 기록한 책이 없어요';
    list.appendChild(empty);
  }
  books.forEach((title, idx) => {
    const row = document.createElement('div');
    row.className = 'book-row';

    const left = document.createElement('span');
    left.className = 'left';
    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.style.background = palette[idx % palette.length];
    const span = document.createElement('span');
    span.textContent = title;
    left.appendChild(dot);
    left.appendChild(span);

    const del = document.createElement('button');
    del.setAttribute('aria-label', '삭제');
    del.innerHTML = '&times;';
    del.addEventListener('click', () => {
      data[selectedKey].splice(idx, 1);
      if (data[selectedKey].length === 0) delete data[selectedKey];
      saveAll();
      renderBookList();
      renderGrid();
    });

    row.appendChild(left);
    row.appendChild(del);
    list.appendChild(row);
  });
}

function addBook(){
  const input = document.getElementById('book-input');
  const val = input.value.trim();
  if (!val || !selectedKey) return;
  if (!data[selectedKey]) data[selectedKey] = [];
  data[selectedKey].push(val);
  input.value = '';
  saveAll();
  renderBookList();
  renderGrid();
}

document.getElementById('add-book-btn').addEventListener('click', addBook);
document.getElementById('book-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') addBook(); });
document.getElementById('close-editor').addEventListener('click', () => {
  document.getElementById('editor').style.display = 'none';
  selectedKey = null;
});
document.getElementById('prev-btn').addEventListener('click', () => { current = new Date(current.getFullYear(), current.getMonth()-1, 1); renderGrid(); });
document.getElementById('next-btn').addEventListener('click', () => { current = new Date(current.getFullYear(), current.getMonth()+1, 1); renderGrid(); });

loadAll();
renderWeekdayRow();
renderGrid();
</script>
</body>
</html>
