<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>독서 캘린더</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Gowun Dodum', sans-serif;
    background: transparent;
    margin: 0;
    padding: 8px;
  }
  .wrap { width: 100%; }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .month-label { font-family: 'Jua', sans-serif; font-size: 22px; color: #2C2C2A; }
  .nav-btns { display: flex; gap: 6px; }
  .nav-btns button {
    width: 32px; height: 32px; padding: 0;
    border: 0.5px solid #D3D1C7; background: white;
    border-radius: 50%; cursor: pointer; font-size: 16px; color: #5F5E5A;
  }
  .nav-btns button:hover { background: #F1EFE8; }
  .weekday-row {
    display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 5px;
  }
  .weekday-row div {
    text-align: center; font-family: 'Jua', sans-serif;
    font-size: 13px; padding: 4px 0;
  }
  .day-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;
  }
  .day-cell {
    aspect-ratio: 1 / 1; max-height: 70px;
    border: 0.5px solid #E3E1D8; border-radius: 10px;
    background: white; display: flex; flex-direction: column;
    align-items: flex-start; justify-content: flex-start;
    padding: 7px; gap: 5px; cursor: pointer;
  }
  .day-cell:hover { border-color: #B4B2A9; }
  .day-cell.empty { visibility: hidden; cursor: default; }
  .day-num { font-size: 14px; }
  .dot-row { display: flex; gap: 3px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .editor {
    display: none; margin-top: 1.5rem;
    background: white; border: 0.5px solid #E3E1D8;
    border-radius: 14px; padding: 1.2rem 1.5rem;
  }
  .editor-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .editor-header p { font-family: 'Jua', sans-serif; font-size: 16px; margin: 0; }
  .editor-header button {
    width: 28px; height: 28px; padding: 0; border: none; background: none;
    cursor: pointer; font-size: 18px; color: #888780;
  }
  .input-row { display: flex; gap: 8px; }
  .input-row input {
    flex: 1; font-family: 'Gowun Dodum', sans-serif;
    border: 0.5px solid #D3D1C7; border-radius: 8px;
    padding: 8px 12px; font-size: 14px;
  }
  .input-row input:focus { outline: 2px solid #CDE9F6; border-color: #A8D8EA; }
  .input-row button {
    font-family: 'Gowun Dodum', sans-serif;
    border: 0.5px solid #D3D1C7; background: white;
    border-radius: 8px; padding: 0 16px; font-size: 14px; cursor: pointer;
  }
  .input-row button:hover { background: #F1EFE8; }
  .book-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .book-row {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 13px; padding: 8px 10px;
    background: #F7F6F2; border-radius: 8px;
  }
  .book-row .left { display: flex; align-items: center; gap: 8px; }
  .book-row .left .dot { width: 8px; height: 8px; flex-shrink: 0; }
  .book-row button {
    width: 24px; height: 24px; padding: 0; border: none; background: none;
    cursor: pointer; color: #B4B2A9; font-size: 16px;
  }
  .book-row button:hover { color: #993C1D; }
  .empty-msg { font-size: 13px; color: #B4B2A9; margin: 4px 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="month-label" id="month-label"></div>
    <div class="nav-btns">
      <button id="prev-btn">&#8249;</button>
      <button id="next-btn">&#8250;</button>
    </div>
  </div>
  <div class="weekday-row" id="weekday-row"></div>
  <div class="day-grid" id="day-grid"></div>
  <div class="editor" id="editor">
    <div class="editor-header">
      <p id="editor-date"></p>
      <button id="close-editor">&times;</button>
    </div>
    <div class="input-row">
      <input id="book-input" type="text" placeholder="읽은 책 제목" />
      <button id="add-btn">추가</button>
    </div>
    <div class="book-list" id="book-list"></div>
  </div>
</div>

<script>
const weekdays = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const palette = ['#FBD9E2','#CDE9F6','#E4DAF1'];
const dowColor = (i) => i===0?'#E24B4A':i===6?'#378ADD':'#2C2C2A';
const STORAGE_KEY = 'reading-calendar-data';

let current = new Date();
let data = {};
let selectedKey = null;

function keyOf(y,m,d){ return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }

function load(){
  try{ const r=localStorage.getItem(STORAGE_KEY); data=r?JSON.parse(r):{}; }catch(e){ data={}; }
}
function save(){
  try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(data)); }catch(e){}
}

function renderWeekdays(){
  const row=document.getElementById('weekday-row');
  row.innerHTML='';
  weekdays.forEach((w,i)=>{
    const d=document.createElement('div');
    d.textContent=w;
    d.style.color=dowColor(i);
    row.appendChild(d);
  });
}

function renderGrid(){
  document.getElementById('month-label').textContent=current.getFullYear()+'년 '+(current.getMonth()+1)+'월';
  const grid=document.getElementById('day-grid');
  grid.innerHTML='';
  const y=current.getFullYear(), m=current.getMonth();
  const firstDow=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const total=Math.ceil((firstDow+daysInMonth)/7)*7;

  for(let i=0;i<total;i++){
    const dn=i-firstDow+1;
    const cell=document.createElement('div');
    cell.className='day-cell';
    if(dn<1||dn>daysInMonth){
      cell.classList.add('empty');
    } else {
      const dow=(firstDow+dn-1)%7;
      const num=document.createElement('span');
      num.className='day-num';
      num.textContent=dn;
      num.style.color=dowColor(dow);
      cell.appendChild(num);

      const k=keyOf(y,m,dn);
      const books=data[k]||[];
      const dotRow=document.createElement('div');
      dotRow.className='dot-row';
      books.slice(0,4).forEach((_,idx)=>{
        const dot=document.createElement('span');
        dot.className='dot';
        dot.style.background=palette[idx%palette.length];
        dotRow.appendChild(dot);
      });
      cell.appendChild(dotRow);
      cell.addEventListener('click',()=>openEditor(k,y,m,dn));
    }
    grid.appendChild(cell);
  }
}

function openEditor(k,y,m,d){
  selectedKey=k;
  document.getElementById('editor').style.display='block';
  document.getElementById('editor-date').textContent=y+'년 '+(m+1)+'월 '+d+'일';
  document.getElementById('book-input').value='';
  renderList();
}

function renderList(){
  const list=document.getElementById('book-list');
  list.innerHTML='';
  const books=data[selectedKey]||[];
  if(!books.length){
    const p=document.createElement('p');
    p.className='empty-msg';
    p.textContent='아직 기록한 책이 없어요';
    list.appendChild(p);
  }
  books.forEach((title,idx)=>{
    const row=document.createElement('div');
    row.className='book-row';
    const left=document.createElement('span');
    left.className='left';
    const dot=document.createElement('span');
    dot.className='dot';
    dot.style.background=palette[idx%palette.length];
    const span=document.createElement('span');
    span.textContent=title;
    left.appendChild(dot); left.appendChild(span);
    const del=document.createElement('button');
    del.innerHTML='&times;';
    del.addEventListener('click',()=>{
      data[selectedKey].splice(idx,1);
      if(!data[selectedKey].length) delete data[selectedKey];
      save(); renderList(); renderGrid();
    });
    row.appendChild(left); row.appendChild(del);
    list.appendChild(row);
  });
}

function addBook(){
  const input=document.getElementById('book-input');
  const val=input.value.trim();
  if(!val||!selectedKey) return;
  if(!data[selectedKey]) data[selectedKey]=[];
  data[selectedKey].push(val);
  input.value='';
  save(); renderList(); renderGrid();
}

document.getElementById('add-btn').addEventListener('click',addBook);
document.getElementById('book-input').addEventListener('keydown',(e)=>{ if(e.key==='Enter') addBook(); });
document.getElementById('close-editor').addEventListener('click',()=>{ document.getElementById('editor').style.display='none'; selectedKey=null; });
document.getElementById('prev-btn').addEventListener('click',()=>{ current=new Date(current.getFullYear(),current.getMonth()-1,1); renderGrid(); });
document.getElementById('next-btn').addEventListener('click',()=>{ current=new Date(current.getFullYear(),current.getMonth()+1,1); renderGrid(); });

load(); renderWeekdays(); renderGrid();
</script>
</body>
</html>
